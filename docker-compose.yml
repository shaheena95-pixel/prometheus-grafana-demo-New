version: '3'

# Named volumes — data persists even if containers are restarted
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Scrapes and stores metrics from all configured targets
  # UI available at: http://<IP>:9090
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /etc/prometheus:/etc/prometheus       # host config file mounted here
      - prometheus-data:/prometheus           # time-series data stored here
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Visualisation and dashboarding layer
  # UI available at: http://<IP>:3000  (default login: admin / admin)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana         # dashboards and settings persisted
    restart: unless-stopped

  # ── Node Exporter ───────────────────────────────────────────────────────────
  # Exports host-level metrics: CPU, RAM, disk, network, etc.
  # Scraped by Prometheus at: http://node_exporter:9100/metrics
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    pid: host                                 # needed for accurate CPU metrics
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'                   # read-only access to host filesystem

  # ── cAdvisor ────────────────────────────────────────────────────────────────
  # Container Advisor — exports per-container metrics: CPU, RAM, network, I/O
  # Scraped by Prometheus at: http://cadvisor:8080/metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
